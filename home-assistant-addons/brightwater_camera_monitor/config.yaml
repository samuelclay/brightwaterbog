name: Brightwater Camera Monitor
version: "0.3.1"
slug: brightwater_camera_monitor
description: Camera wall with automatic camera power and stale-feed recovery.
arch:
  - amd64
startup: application
boot: auto
init: false
homeassistant_api: true
hassio_api: true
hassio_role: default
ingress: false
options:
  ha_url: "http://supervisor/core"
  ha_token: ""
  warm_agent: true
schema:
  ha_url: str
  ha_token: password
  warm_agent: bool
ports:
  8765/tcp: 80
ports_description:
  8765/tcp: Camera wall web UI
webui: "http://[HOST]:[PORT:8765]"
watchdog: "http://[HOST]:[PORT:8765]/api/status"
